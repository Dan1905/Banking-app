spring.application.name=transaction
server.port=8083


spring.datasource.url=${TRANSACTION_DB_URL:jdbc:mysql://localhost:3307/transaction_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:banking-app-super-secret-key-change-in-production-min32}
internal.api-token=${INTERNAL_API_TOKEN:my-internal-secret-token}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.topic.transaction-events=${KAFKA_TOPIC_TRANSACTION_EVENTS:transaction.events}

account.service.url=${ACCOUNT_SERVICE_URL:http://localhost:8082}

management.endpoints.web.exposure.include=health
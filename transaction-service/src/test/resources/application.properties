# Test config - H2 in-memory database
server.port=0
spring.application.name=transaction-test

spring.datasource.url=jdbc:h2:mem:transaction_test_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

jwt.secret=testing-secret-key-for-transaction
internal.api-token=test-internal-token

spring.kafka.bootstrap-servers=127.0.0.1:9092
kafka.topic.transaction-events=transaction.events
account.service.url=http://localhost:8082
auth.service.url=http://localhost:8081

management.endpoints.web.exposure.include=health

# Test config - H2 in-memory database (gateway doesn't need a DB but keep consistency)
server.port=0
spring.application.name=api-gateway-test

spring.datasource.url=jdbc:h2:mem:gateway_test_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

jwt.secret=testing-secret-key-for-gateway

services.auth-url=http://localhost:8081
services.account-url=http://localhost:8082
services.transaction-url=http://localhost:8083
services.notification-url=http://localhost:8084

management.endpoints.web.exposure.include=health

server.port=8080
spring.application.name=api-gateway

jwt.secret=${JWT_SECRET:banking-app-super-secret-key-change-in-production-min32}

services.auth-url=${AUTH_SERVICE_URL:http://localhost:8081}
services.account-url=${ACCOUNT_SERVICE_URL:http://localhost:8082}
services.transaction-url=${TRANSACTION_SERVICE_URL:http://localhost:8083}
services.notification-url=${NOTIFICATION_SERVICE_URL:http://localhost:8084}

management.endpoints.web.exposure.include=health
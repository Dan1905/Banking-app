# Server
server.port=8081

spring.application.name=auth

# Database
spring.datasource.url=${AUTH_DB_URL:jdbc:mysql://localhost:3307/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:banking-app-super-secret-key-change-in-production-min32}
jwt.expiration-ms=86400000
internal.api-token=${INTERNAL_API_TOKEN:my-internal-secret-token}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.com.bank.auth=DEBUG
logging.level.org.springframework.security=INFO

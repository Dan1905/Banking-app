# Test Configuration
# Server
server.port=8081

spring.application.name=auth-test

# H2 In-Memory Database (perfect for CI/CD)
spring.datasource.url=jdbc:h2:mem:auth_test_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=testing-secret-key-that-is-long-enough-for-jwt-256-bit
jwt.expiration-ms=3600000

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.com.bank.auth=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=WARN

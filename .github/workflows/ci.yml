name: Banking App CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}

jobs:
  # First job: run tests and build the JARs.
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: auth_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
      zookeeper:
        image: confluentinc/cp-zookeeper:7.4.0
        ports:
          - 2181:2181
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
        options: --health-cmd="echo ruok | nc -w 1 localhost 2181 || exit 1" --health-interval=10s --health-timeout=5s --health-retries=5
      kafka:
        image: confluentinc/cp-kafka:7.4.0
        ports:
          - 9092:9092
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092,PLAINTEXT://127.0.0.1:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        options: --health-cmd="kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1" --health-interval=10s --health-timeout=5s --health-retries=20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install MySQL client and netcat
        run: |
          sudo apt-get update
          sudo apt-get install -y default-mysql-client netcat

      - name: Wait for MySQL to accept connections and create DBs
        run: |
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "SELECT 1" >/dev/null 2>&1; then
              echo "MySQL ready" && break
            fi
            echo "Waiting for MySQL... ($i)" && sleep 2
          done
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS auth_db;"
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS account_db;"
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS transaction_db;"
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS notification_db;"

      - name: Wait for Kafka to be ready
        run: |
          set -euo pipefail
          echo "Waiting for Kafka broker admin commands to succeed"
          for i in {1..60}; do
            KID=$(docker ps --filter "ancestor=confluentinc/cp-kafka:7.4.0" -q | head -n1 || true)
            if [ -z "$KID" ]; then
              echo "Kafka container not ready yet ($i)"
              sleep 3
              continue
            fi

            if docker exec "$KID" bash -lc "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"; then
              echo "Kafka broker is ready"
              exit 0
            fi

            echo "Kafka broker not ready yet ($i)"
            sleep 3
          done

          echo "Kafka did not become ready in time" >&2
          docker ps --filter "ancestor=confluentinc/cp-kafka:7.4.0" || true
          exit 1

      - name: Build and test all services
        run: |
          mvn -B -DskipTests=false \
              -Dspring.datasource.username=root \
              -Dspring.datasource.password=root \
              -Dspring.kafka.bootstrap-servers=127.0.0.1:9092 \
              clean package -f pom.xml
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}

  # Second job: only publish Docker images after tests succeed on main.
  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JARs
        run: mvn clean package -DskipTests -f pom.xml

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/auth-service:latest

      - name: Build and push account-service
        uses: docker/build-push-action@v5
        with:
          context: ./account-service
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/account-service:latest

      - name: Build and push transaction-service
        uses: docker/build-push-action@v5
        with:
          context: ./transaction-service
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/transaction-service:latest

      - name: Build and push notification-service
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/notification-service:latest

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/api-gateway:latest
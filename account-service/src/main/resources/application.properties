server.port=8082
spring.application.name=account

spring.datasource.url=${ACCOUNT_DB_URL:jdbc:mysql://localhost:3307/account_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:banking-app-super-secret-key-change-in-production-min32}
internal.api-token=${INTERNAL_API_TOKEN:my-internal-secret-token}

management.endpoints.web.exposure.include=health

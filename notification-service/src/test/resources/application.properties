# Test config - H2 in-memory database
server.port=0
spring.application.name=notification-test

spring.datasource.url=jdbc:h2:mem:notification_test_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

jwt.secret=testing-secret-key-for-notification

spring.kafka.bootstrap-servers=127.0.0.1:9092
spring.kafka.consumer.group-id=notification-group
kafka.topic.transaction-events=transaction.events

management.endpoints.web.exposure.include=health
